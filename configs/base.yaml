imports:
  - system.yaml

pipeline:
  k: 20
  seed: 42
  recent_days: 30

candidates:
  per_generator_k: 800
  generators:
    - name: global_popularity
      params: {}
    - name: user_genre
      params:
        genre_smoothing: 1.0
    - name: user_author
      params:
        author_smoothing: 1.0
    - name: tfidf_knn
      params:
        max_features: 5000
        ngram_max: 1
        n_neighbors: 40
        history_limit: 2
        top_editions: 50000

ranking:
  source_weights:
    global_popularity: 0.35
    user_genre: 1.6
    user_author: 1.8
    tfidf_knn: 1.4

validation:
  pseudo_incident_days: 14
